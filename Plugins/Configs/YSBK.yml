# Handle only IFR aircraft
- if:
    atis_dep_rwy: ["11C"]
  if_not:
    VFR: "true"
  runway: "11C"
  CFL: "030"
- if:
    atis_dep_rwy: ["29C"]
  if_not:
    VFR: "true"
  runway: "29C"
  CFL: "030"

# SIDs
- if:
    radials: ["115-290"]
  if_not:
    VFR: "true"
  SID: "MECKO"

- if:
    radials: ["290-359", "000-115"]
  if_not:
    VFR: "true"
  SID: "URDOS"

- if:
    waypoint: ["NOLEM"]
  if_not:
    VFR: "true"
  SID: "MECKO"