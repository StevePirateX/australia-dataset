- assign_dep_rwy: "true"
- CFL: "030"
- if:
    jet: "true"
  CFL: "040"

# Default to Radar SID
- SID: "WS"

# Day Jet SIDs
- if:
    jet: "true"
    waypoint: ["BENBU"]
  SID: "#BENB\\dD"
  
- if:
    jet: "true"
    waypoint: ["CAWLY", "DIPSO", "EVONN", "NOBAR", "OLSEM", "OPTIC"]
  SID: "#TESA\\dD"
  
- if:
    jet: "true"
    waypoint: ["PKS"]
  SID: "#PKS\\dD"
  
- if:
    jet: "true"
    waypoint: ["TEEVE"]
  SID: "#TEEV\\dD"
  
- if:
    jet: "true"
    waypoint: ["LEECE", "NWA"]
  SID: "#TONT\\dD"

# Day Non-Jet SIDs (overridden later by night procedures as applicable)
- if:
    runway: ["05"]
  if_not:
    jet: "true"
  SID: "#ADPA\\dD"

- if:
    runway: ["05"]
    radials: ["250-359", "000-110"]
  if_not:
    jet: "true"
  SID: "#ISDI\\dD"

- if:
    runway: ["05"]
    waypoint: ["KAMBA", "NOBAR", "DIPSO"]
  if_not:
    jet: "true"
  SID: "#KAMB\\dD"

- if:
    runway: ["23"]
    radials: ["250-359", "000-110"]
  if_not:
    jet: "true"
  SID: "#LEKI\\dD"

- if:
    runway: ["23"]
    waypoint: ["EXETA", "NWA", "WOL"]
  if_not:
    jet: "true"
  SID: "#REGE\\dD"

# Hot SIDs
- if:
    jet: "true"
    waypoint: ["LEECE", "NWA"]
    runway: ["05"]
    temp_above: "35"
  SID: "#TONT\\dH"

- if:
    jet: "true"
    waypoint: ["LEECE", "NWA"]
    runway: ["23"]
    temp_above: "35"
  SID: "#MELI\\dH"

# Night SIDs (assumes UTC+10)
- if:
    time: ["1300-1930"]
    waypoint: ["KAMBA"]
  if_not:
    jet: "true"
  SID: "#KAMB\\dN"

- if:
    time: ["1300-1930"]
    waypoint: ["BENBU"]
  SID: "#BENB\\dN"

- if:
    time: ["1300-1930"]
    waypoint: ["CAWLY", "EVONN", "OPTIC"]
  SID: "#ENDE\\dN"

- if:
    time: ["1300-1930"]
    waypoint: ["TEEVE", "PKS"]
  SID: "#TEEV\\dN"

  # 05 night SIDs
- if:
    time: ["1300-1930"]
    waypoint: ["DIPSO", "NOBAR", "OLSEM"]
    runway: ["05"]
  SID: "#PASG\\dN"

- if:
    time: ["1300-1930"]
    waypoint: ["EXETA", "LEECE", "NWA"]
    runway: ["05"]
  SID: "#REDA\\dN"

  # Default 23 jet night SID
- if:
    time: ["1300-1930"]
    jet: "true"
    runway: ["23"]
  SID: "#REDA\\dN"

- if:
    time: ["1300-1930"]
    waypoint: ["DIPSO", "NOBAR"]
    runway: ["23"]
  SID: "#PASG\\dN"

- if:
    time: ["1300-1930"]
    waypoint: ["EXETA", "LEECE", "NWA"]
    runway: ["23"]
  SID: "#REDA\\dN"

# RRO SIDs (searches the entire ATIS for the runway nomination)
- if:
    atis_regex: "RWY:\\s*05\\s+FOR\\s+ARR.*?23\\s+FOR\\s+DEP"
    runway: ["23"]
  SID: "WS"

- if:
    atis_regex: "RWY:\\s*05\\s+FOR\\s+ARR.*?23\\s+FOR\\s+DEP"
    runway: ["23"]
    waypoint: ["KAMBA"]
  if_not:
      jet: "true"
  SID: "#KAMB\\dQ"
  
- if:
    atis_regex: "RWY:\\s*05\\s+FOR\\s+ARR.*?23\\s+FOR\\s+DEP"
    runway: ["23"]
    waypoint: ["BENBU"]
  SID: "#BENB\\dQ"
  
- if:
    atis_regex: "RWY:\\s*05\\s+FOR\\s+ARR.*?23\\s+FOR\\s+DEP"
    runway: ["23"]
    waypoint: ["CAWLY", "DIPSO", "EVONN", "NOBAR", "OLSEM", "OPTIC"]
  SID: "#ENDE\\dQ"
  
- if:
    atis_regex: "RWY:\\s*05\\s+FOR\\s+ARR.*?23\\s+FOR\\s+DEP"
    runway: ["23"]
    waypoint: ["EXETA", "LEECE", "NWA"]
  SID: "#TONT\\dQ"
  
- if:
    atis_regex: "RWY:\\s*05\\s+FOR\\s+ARR.*?23\\s+FOR\\s+DEP"
    runway: ["23"]
    waypoint: ["TEEVE", "PKS"]
  SID: "#TEEV\\dQ"
  
- if:
    atis_regex: "RWY:\\s*05\\s+FOR\\s+ARR.*?23\\s+FOR\\s+DEP"
  CFL: "100"

- departures: ["118.4", "123.0", "129.7", "124.4", "128.3", "126.1", "125.3", "124.55", "129.8", "133.15"]